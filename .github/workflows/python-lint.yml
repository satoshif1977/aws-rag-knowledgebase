name: Python Lint & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: ruff / black チェック
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint tools & test deps
        run: pip install ruff black pytest boto3 botocore pytest-cov

      - name: ruff（構文チェック・未使用 import 検出）
        run: ruff check app/ lambda/

      - name: black（フォーマットチェック）
        run: black --check app/ lambda/

      - name: pytest（ユニットテスト）
        run: pytest lambda/test_index.py -v --cov=lambda --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: lambda
          fail_ci_if_error: false

  security:
    name: Checkov セキュリティスキャン
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: false
          skip_check: >-
            CKV_AWS_117,CKV_AWS_272,
            CKV_AWS_116,CKV_AWS_115,
            CKV_AWS_173,CKV_AWS_158,
            CKV_AWS_338,CKV_AWS_145,
            CKV_AWS_18,CKV_AWS_144,
            CKV2_AWS_62,CKV_AWS_59,
            CKV_AWS_76,CKV_AWS_73,
            CKV_AWS_120,CKV_AWS_237,
            CKV2_AWS_4,CKV2_AWS_51,
            CKV2_AWS_53,CKV2_AWS_29
          output_format: cli
