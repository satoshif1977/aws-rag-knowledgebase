name: Python Lint & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: ruff / black チェック
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint tools & test deps
        run: pip install ruff black pytest boto3 botocore pytest-cov

      - name: ruff（構文チェック・未使用 import 検出）
        run: ruff check app/ lambda/

      - name: black（フォーマットチェック）
        run: black --check app/ lambda/

      - name: pytest（ユニットテスト）
        run: pytest lambda/test_index.py -v --cov=lambda --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: lambda
          fail_ci_if_error: false
