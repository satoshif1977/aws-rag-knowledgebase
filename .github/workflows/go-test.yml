name: Go Test

on:
  push:
    paths:
      - "lambda_go/**"
  pull_request:
    paths:
      - "lambda_go/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.21"
          cache-dependency-path: lambda_go/go.sum
      - name: Run tests
        working-directory: lambda_go
        run: go test ./... -v
